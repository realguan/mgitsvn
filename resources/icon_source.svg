<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#323232" />
      <stop offset="100%" style="stop-color:#1e1e1e" />
    </linearGradient>
    
    <!-- Logo Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00e5ff" />
      <stop offset="100%" style="stop-color:#7028ff" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur" />
      <feComponentTransfer in="blur">
        <feFuncA type="linear" slope="0.6" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Solid Rounded Background -->
  <rect x="0" y="0" width="256" height="256" rx="40" fill="url(#bgGrad)" />

  <!-- Logo Group -->
  <g transform="translate(48, 64)" filter="url(#glow)">
    <!-- Git Branch Line -->
    <path d="M30 110 V 30 m0 50 L 70 40" fill="none" stroke="url(#logoGrad)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Git Nodes -->
    <circle cx="30" cy="110" r="10" fill="url(#logoGrad)" />
    <circle cx="30" cy="30" r="10" fill="url(#logoGrad)" />
    
    <!-- SVN Wave Hook -->
    <path d="M70 40 C 95 20, 110 100, 140 60" fill="none" stroke="url(#logoGrad)" stroke-width="16" stroke-linecap="round" />
    <circle cx="70" cy="40" r="10" fill="url(#logoGrad)" />
  </g>
</svg>
